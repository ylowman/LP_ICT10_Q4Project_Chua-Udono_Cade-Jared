<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">


    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <style>
        body {
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        .navbar{
            background-color: #81add8;
            padding: 10px 20px;
        }

        .nav-link {
            color: #e5e5e5;
            margin-right: 15px;
            text-decoration: none;
        }

        .nav-link:hover {
            color: hsl(211, 100%, 62%);
        }

        .page-content {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            min-height: calc(100vh - 90px);
            gap: 30px;
            padding: 40px 50px;
        }

        .container-checker {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
            margin: 0;
        }

        .graph-container {
            flex: 1;
            min-width: 500px;
            min-height: 420px;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

    
    </style>

</head>
<body>
    
<nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">10-Sapphire</a>
            <div class="ms-auto d-flex">
                <a class="nav-link" href="index.html">Classmates</a>
                <a class="nav-link active" href="Attendance Tracker.html">Attendance Checker</a>
                <a class="nav-link" href="Gallery.html">Gallery</a>
            </div>
        </div>
</nav>

    
    <div class="page-content">
        <div class="container-checker">
            <h1 class="text-center mt-4">Attendance Tracker</h1>
            <div class="mb-3">
                <label for="days" class="form-label">Select Day</label>
                <select id="days" class="form-select">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="absences" class="form-label">Select Absences</label>
                <select id="absences" class="form-select">
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
            <div class="d-grid">
                <button type="button" class="btn btn-primary" py-click="displaying">Create Graph</button>
            </div>
        </div>
        <div class="graph-container">
            <div id="attendance-graph" style="width:50%; height:100%;"></div>
            <py-script src="main2.py"></py-script>
        </div>
    </div>

</body>
</html>
