<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Classmate System</title>
    <style>
body {
    font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    background-color: #edfeff;
    color: #000000;
        }

.navbar{
            background-color: #81add8;
            padding: 10px 20px;
        }

        .nav-link {
            color: #e5e5e5;
            margin-right: 15px;
            text-decoration: none;
        }

        .nav-link:hover {
            color: hsl(211, 100%, 62%);
        }

.form-card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 6px 16px #242424;
    max-width: 500px;
    padding: 40px;
    margin: 80px auto;
    border: 2px solid #b4b4b4;
    text-align: center;
        }

h1, h2 {
    color: #0c9db3;
        }

input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #000000;
        }

.btn-group {
    display: flex;
     gap: 10px;
    justify-content: center;
        }

button {
    padding: 10px 15px;
    background-color: #0c9db3;
    border-radius: 8px;
    color:#ffffff;
    font-weight: 600;
    border: none;
        }


.output-box {
    margin-top: 20px;
    padding: 15px;
    background-color: #ffffff;
    border-radius: 10px;
    border: 1px solid #595959;
    text-align: center;
    color:#000000;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="index.html">10-Sapphire</a>
            <div class="ms-auto d-flex">
                <a class="nav-link active" href="index.html">Classmates</a>
                <a class="nav-link" href="Attendance Tracker.html">Attendance Checker</a>
                <a class="nav-link" href="Gallery.html">Gallery</a>
            </div>
        </div>
    </nav>

    <div class="signup-container">
    <div class="form-card">
        <h1>Grade 10 Classmate System</h1>

        <div class="form-group">
            <label>Name</label>
            <input type="text" id="username" placeholder="example: Jared">
        </div>

        <div class="form-group">
            <label>Section</label>
            <input type="text" id="section" placeholder="example: Sapphire">
        </div>

        <div class="form-group">
            <label>Favorite Subject</label>
            <input type="text" id="fav" placeholder="example: English">
        </div>

        <div class="btn-group">
        <button py-click="AddClassmate">Add New Classmate</button>
        <button py-click="ShowClassmates">Show Classlist</button>
    </div>


        <div class="output-box" id="signed"></div>
    <div class="output-box" id="classmate-list"></div>

<script type="py" src="main.py"></script>

</body>
</html>
